name: Build

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: "10.0.0"
  NODE_VERSION: "20"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            runner: macos-14
            arch: x64
          - target: aarch64-apple-darwin
            os: macos-latest
            runner: [self-hosted, macOS, ARM64]
            arch: arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            runner: ubuntu-latest
            arch: x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            runner: windows-latest
            arch: x64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri (${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "nOffice ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  notarize-macos-x64:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
      - name: Notarize macOS x64 build
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in *.dmg; do
            xcrun notarytool submit "$dmg" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait || true
            xcrun stapler staple "$dmg" || true
          done

  notarize-macos-arm64:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/download-artifact@v4
      - name: Notarize macOS ARM64 build
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in *.dmg; do
            xcrun notarytool submit "$dmg" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait || true
            xcrun stapler staple "$dmg" || true
          done
