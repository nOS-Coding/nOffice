name: Build & Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: "10.0.0"
  NODE_VERSION: "20"

jobs:
  lint:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: TypeScript check
        run: pnpm build 2>&1 | tail -5

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            os: macos-13
            arch: x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri (${{ matrix.target }})
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "nOffice ${{ github.ref_name }}"
          releaseBody: |
            ## nOffice ${{ github.ref_name }}

            ### Changes
            - All apps: document persistence, keyboard shortcuts, bug fixes
            - nWrite: font size, text color, code/blockquote/link/task buttons
            - nSheet: fixed formula operator precedence, IF/COUNT functions, new formulas (ABS, ROUND, TODAY, LEN, UPPER, LOWER)
            - nSlides: slide reorder, duplicate, undo/redo, keyboard shortcuts
            - nImg: image import, zoom controls, keyboard shortcuts
            - nCode: immutable state, factory tree, memoized file list
            - AI: fixed streaming race condition, error display, markdown rendering
            - Security: path traversal fix, CSP enabled, Tauri capabilities configured

            ### Downloads
            - **macOS**: `.dmg` (Apple Silicon + Intel)
            - **Windows**: `.msi` + `.exe`
            - **Linux**: `.AppImage` + `.deb`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
